<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skillpay Auth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Outfit', sans-serif; background: #f9f9f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border-radius: 20px; padding: 40px 32px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.07); }
    .logo { width: 64px; height: 64px; background: #FFC107; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px; font-weight: 700; font-size: 20px; color: white; }
    h1 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p { color: #666; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">SP</div>
    <h1>Skillpay</h1>
    <p>Auth redirect handler. You should not see this page directly.<br/>Open the app to get started.</p>
  </div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
